name: test

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  WORKING_DIR: terraform/

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    env:
      TF_VAR_CLOUDFLARE_TOKEN: test-token
      TF_TOKEN_app_terraform_io: test-token

    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6

      - name: read terraform version
        id: terraform-version
        working-directory: .
        run: echo "version=$(cat .terraform-version)" >> "$GITHUB_OUTPUT"

      - name: setup terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # pin@v4.0.1
        with:
          terraform_version: ${{ steps.terraform-version.outputs.version }}

      - name: prepare backendless copy
        run: |
          copy_dir="$(mktemp -d)"
          ../script/ci/prepare-backendless-copy.sh "$PWD" "$copy_dir"
          echo "BACKENDLESS_DIR=$copy_dir" >> "$GITHUB_ENV"

      - name: terraform init
        working-directory: ${{ env.BACKENDLESS_DIR }}
        run: terraform init -backend=false -lockfile=readonly

      - name: terraform validate
        working-directory: ${{ env.BACKENDLESS_DIR }}
        run: terraform validate -no-color

  test:
    name: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    env:
      TF_VAR_CLOUDFLARE_TOKEN: test-token
      TF_TOKEN_app_terraform_io: test-token

    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6

      - name: read terraform version
        id: terraform-version
        working-directory: .
        run: echo "version=$(cat .terraform-version)" >> "$GITHUB_OUTPUT"

      - name: setup terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # pin@v4.0.1
        with:
          terraform_version: ${{ steps.terraform-version.outputs.version }}

      - name: prepare backendless copy
        run: |
          copy_dir="$(mktemp -d)"
          ../script/ci/prepare-backendless-copy.sh "$PWD" "$copy_dir"
          echo "BACKENDLESS_DIR=$copy_dir" >> "$GITHUB_ENV"

      - name: terraform init
        working-directory: ${{ env.BACKENDLESS_DIR }}
        run: terraform init -backend=false -lockfile=readonly

      - name: terraform test
        working-directory: ${{ env.BACKENDLESS_DIR }}
        run: terraform test -no-color
